name: 🟡 Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"    # auto-runs every day at midnight UTC
  workflow_dispatch:         # manual trigger button in Actions tab
  push:
    branches: [main]         # also runs on every push to main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Pac-Man SVG
        uses: Platane/snk@v3
        with:
          github_user_name: gitkrypton18
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_dots=#00FF41

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

## 2 — Enable write permissions

Your repo → **Settings** → **Actions** → **General**

Scroll down to **Workflow permissions** → select **Read and write permissions** → click **Save**

![permissions location]

---

## 3 — Run it manually the first time

Go to your repo → **Actions tab** → you'll see **🟡 Pac-Man Contribution Graph** in the left sidebar → click it → click the **Run workflow** button → **Run workflow** (green button)

It takes about 30 seconds. After it finishes, GitHub will have created an `output` branch in your repo containing:
```
output/
  pacman-contribution-graph.svg
  pacman-contribution-graph-dark.svg
```

---

## 4 — Verify it worked

Visit this URL directly in your browser — if you see the SVG it's working:
```
https://raw.githubusercontent.com/gitkrypton18/gitkrypton18/output/pacman-contribution-graph-dark.svg
