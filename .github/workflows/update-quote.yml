name: Update Dev Quote

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 6 AM UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's quote card SVG
        run: python generate_quote_card.py

      - name: Commit & push updated SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/quote-card.svg
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: update daily dev quote [skip ci]" && \
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
